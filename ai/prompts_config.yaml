# AI 提示词配置文件
# 支持多个命名模板，可根据 arXiv 分类自动选择或手动指定

templates:
  # 通用模板（适用于计算机科学等领域）
  default:
    name: "通用版"
    description: "适用于 cs.CV, cs.CL, cs.AI 等计算机科学论文"
    system_prompt: |
      You are a professional paper analyst.
      You should not respond too long output.
      Your output should in {language}.
      Focus on: problem definition, methodology, experiments, and conclusions.
    user_prompt: |
      Please analyze the following paper abstract.

      Title: {title}
      Authors: {authors}
      Abstract:
      {content}

      Provide:
      1. **translated_abstract**: Complete Chinese translation of the abstract
      2. **tldr**: One-sentence summary
      3. **motivation**: What problem does this paper solve?
      4. **method**: Key methodology or approach
      5. **result**: Main results and contributions
      6. **conclusion**: Limitations and future work
    kimi_prompt: |
      请你阅读这篇文章{pdf_url}，总结一下这篇文章：
      1. 解决的问题：这篇文章要解决什么核心问题？
      2. 研究方法：使用了什么方法或技术？
      3. 实验及结果：做了什么实验，结果如何？
      4. 主要贡献：文章的核心创新点是什么？
      5. 结论和局限：整体总结及存在的问题。

  # 数学分析专用模板
  math_ap:
    name: "数学分析版"
    description: "专为 math.AP（分析偏微分方程）设计，强调数学结构和证明技巧"
    system_prompt: |
      You are a research-level mathematician specializing in mathematical analysis and PDE theory.
      Your output should in {language}.
      Be precise, rigorous, and technically sophisticated in your analysis.
      Focus on deep mathematical structure, cutting-edge techniques, and theoretical breakthroughs.
    user_prompt: |
      Please analyze this mathematical analysis paper in detail.

      Title: {title}
      Authors: {authors}
      Abstract:
      {content}

      Provide a comprehensive analysis including:
      1. **translated_abstract**: Complete Chinese translation of the mathematical abstract
      2. **tldr**: One-sentence summary in Chinese
      3. **motivation**: What mathematical problem or PDE system is being studied?
      4. **method**: What analytical or numerical methods are used?
         (e.g., Sobolev spaces, energy estimates, fixed point theorems, spectral analysis)
      5. **result**: Main theorems or results proved
      6. **conclusion**: Why are these results important for the field?
    kimi_prompt: |
      你是一位研究级别的偏微分方程专家，精通现代PDE理论的前沿技术。请深入研读这篇论文{pdf_url}，从研究者的专业视角进行深度分析：

      1. **方程背景与结构**：研究的PDE系统具有怎样的数学结构？是良态问题还是病态问题？涉及哪些关键的非线性机制（如色散、耗散、激波形成、奇性传播等）？

      2. **与现有理论的深层联系**：该工作与哪些经典理论或著名结果相关？它如何改进、推广或挑战了已有的数学框架？是否解决了该领域长期存在的猜想或技术障碍？

      3. **核心数学结果**：主要定理的精确陈述是什么？这些结果在何种函数空间（如Sobolev空间、Besov空间、Lorentz空间等）中成立？解的适定性、正则性、长时间行为、爆破/整体存在性等性质如何？

      4. **证明技术与关键估计**：证明中使用了哪些高级分析工具？
         - 先验估计的类型（能量估计、Strichartz估计、极大函数估计、双线性估计等）
         - 迭代格式（不动点论证、Nash-Moser迭代、连续性方法等）
         - 特殊技巧（补偿紧性、集中紧性、 profile分解、modulation稳定性等）
         关键的技术创新点在哪里？

      5. **结果的尖锐性与最优性**：所得结果是临界的（critical）还是次临界的（subcritical）？正则性假设是否最优？是否有反例表明某些条件下结果不成立？

      6. **未解决问题与开放方向**：文章指出了哪些尚未解决的问题？该结果可能开启哪些新的研究路线？与相邻数学分支（几何分析、数学物理、概率论等）有何潜在联系？

      请以研究级别的专业深度进行分析，关注数学思想的精妙之处，并指出技术突破的核心所在。

  # 数学通用模板
  math_general:
    name: "数学通用版"
    description: "适用于其他数学分类（math.NA, math.FA 等）"
    system_prompt: |
      You are a professional mathematician.
      Your output should in {language}.
      Focus on mathematical rigor, definitions, theorems, and proofs.
    user_prompt: |
      Analyze this mathematics paper:

      Title: {title}
      Authors: {authors}
      Abstract:
      {content}

      Provide:
      1. **translated_abstract**: Complete Chinese translation of the abstract
      2. **tldr**: One-sentence summary in Chinese
      3. **motivation**: Main mathematical problem or conjecture
      4. **method**: Proof techniques and methodologies
      5. **result**: Key theorems and their significance
      6. **conclusion**: Mathematical contributions and novelty
    kimi_prompt: |
      你是一位专业数学家。请阅读这篇数学论文{pdf_url}，从数学角度进行分析：

      1. **核心问题**：研究什么数学问题或猜想？
      2. **主要定理**：证明了哪些关键定理？
      3. **证明方法**：使用了什么数学工具和证明技巧？
      4. **文献关联**：与现有文献的联系是什么？
      5. **数学贡献**：对数学领域有什么新颖贡献？

      请以严谨的数学语言进行分析。

# 输出结构定义
output_structure:
  tldr: "一句话总结论文核心内容"
  translated_abstract: "摘要的完整中文翻译"
  motivation: "研究动机和要解决的数学/技术问题"
  method: "使用的方法、技术或证明技巧（数学论文强调理论工具）"
  result: "主要结果、定理或实验发现"
  conclusion: "结论、意义和未来研究方向"

# 分类到模板的映射规则
category_mapping:
  math.AP: "math_ap"
  math.NA: "math_general"
  math.FA: "math_general"
  cs.CV: "default"
  cs.CL: "default"
  cs.AI: "default"
  cs.GR: "default"
  cs.LG: "default"
